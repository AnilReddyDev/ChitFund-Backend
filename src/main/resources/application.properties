spring.application.name=chitfund
# ===============================
# APPLICATION
# ===============================
server.port=8080


# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/chitfund_db
#spring.datasource.username=postgres
#spring.datasource.password=1234

spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway is being introduced after the app already had JPA-managed tables.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# SECURITY
# Override these in production with environment-specific secrets.
# ===============================
app.security.token-ttl-minutes=480
